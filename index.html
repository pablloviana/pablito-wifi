<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro VIP | Pablito Sorvetes</title>
    <link rel="icon" type="image/png" href="logo.png">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Local CSS -->
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Animações Dinâmicas para os Ícones */
        @keyframes bounceUser {
            0%, 100% { transform: translateY(-50%); }
            50% { transform: translateY(-65%) scale(1.15); }
        }
        @keyframes ringPhone {
            0%, 100% { transform: translateY(-50%) rotate(0); }
            10% { transform: translateY(-50%) rotate(15deg); }
            20% { transform: translateY(-50%) rotate(-10deg); }
            30% { transform: translateY(-50%) rotate(10deg); }
            40% { transform: translateY(-50%) rotate(-15deg); }
            50% { transform: translateY(-50%) rotate(0); }
        }
        @keyframes popCalendar {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.2) rotate(10deg); }
        }
        .anim-user { animation: bounceUser 2.5s infinite ease-in-out; color: var(--primary-color) !important; filter: drop-shadow(0px 2px 4px rgba(248,90,94,0.4)); }
        .anim-phone { animation: ringPhone 2.5s infinite ease-in-out; color: var(--primary-color) !important; filter: drop-shadow(0px 2px 4px rgba(248,90,94,0.4)); }
        .anim-calendar { animation: popCalendar 2.5s infinite ease-in-out; color: var(--primary-color) !important; filter: drop-shadow(0px 2px 4px rgba(248,90,94,0.4)); }
    </style>
</head>

<body>

    <main class="login-container">

        <header class="header">
            <img src="logo.png" alt="Pablito Sorvetes Logo" class="logo-image">
            <div
                style="background: var(--secondary-color); color: white; padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 13px; display: inline-block; margin-bottom: 12px; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(0, 208, 200, 0.3);">
                👑 CLUBE VIP</div>
            <p>Faça seu cadastro VIP e garanta vantagens e descontos exclusivos!</p>
        </header>

        <!-- Ajax Submit via JS instead of standard action to avoid redirect -->
        <form id="wifi-form" class="wifi-form">

            <input type="text" name="_honey" style="display:none">
            <input type="hidden" name="_captcha" value="false">

            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <div class="input-icon-wrapper">
                    <svg class="icon anim-user" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input type="text" id="nome" name="Nome" placeholder="Ex: João da Silva" required>
                </div>
            </div>

            <div class="input-group">
                <label for="whatsapp">Telefone</label>
                <div class="input-icon-wrapper">
                    <svg class="icon anim-phone" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                        </path>
                    </svg>
                    <input type="tel" id="telefone" name="Telefone" placeholder="(XX) XXXXX-XXXX" maxlength="15"
                        required>
                </div>
            </div>

            <div class="input-group">
                <label for="aniversario">Dia e Mês do Aniversário <small style="color: var(--text-muted); font-size: 11.5px; opacity:0.8;">(Apenas dia e mês, ex: 25/08)</small></label>
                <div class="input-icon-wrapper">
                    <svg class="icon anim-calendar" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <input type="text" id="aniversario" name="Aniversário" placeholder="DD/MM" maxlength="5" required>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="lgpd-consent" name="Consentimento LGPD" required>
                <label for="lgpd-consent">Aceito entrar para o CLUBE VIP e concordo com os <a href="privacidade.html"
                        target="_blank"
                        style="color: var(--primary-color); font-weight: bold; text-decoration: underline;">Termos de
                        Privacidade</a> para entramos em contato e receber cupons.</label>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn"
                style="background: linear-gradient(135deg, #25d366, #128c7e); box-shadow: 0 6px 15px rgba(37, 211, 102, 0.4);">
                <span>CONCLUIR NO WHATSAPP</span>
                <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 2L11 13"></path>
                    <path d="M22 2L15 22L11 13L2 9L22 2z"></path>
                </svg>
            </button>
        </form>

        <div class="separator">Acesse nossas redes sociais</div>

        <div class="social-links">
            <a href="https://wa.me/5594984110527" target="_blank" class="social-btn whatsapp-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path
                        d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
                </svg>
                WhatsApp
            </a>
            <a href="https://www.instagram.com/pablitosorvete" target="_blank" class="social-btn instagram-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                    <path
                        d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z" />
                </svg>
                Instagram
            </a>
        </div>
    </main>

    <!-- Modal removed since the flow redirects to WhatsApp now -->

    <!-- Script to Handle Form Submit and Redirect to WhatsApp -->
    <script>
        const form = document.getElementById('wifi-form');
        const submitBtn = document.getElementById('submit-btn');

        // Máscara para o Telefone (Celular)
        const telInput = document.getElementById('telefone');
        telInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        // Máscara para o Aniversário (DD/MM)
        const bdayInput = document.getElementById('aniversario');
        bdayInput.addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,2})/);
            e.target.value = !x[2] ? x[1] : x[1] + (x[2] ? '/' + x[2] : '');
        });

        form.addEventListener('submit', function (e) {
            // Prevent actual traditional form submit redirect
            e.preventDefault();

            submitBtn.innerHTML = '<span>REDIRECIONANDO...</span>';
            submitBtn.style.opacity = '0.7';
            submitBtn.style.cursor = 'not-allowed';

            const formData = new FormData(form);
            const nome = formData.get('Nome');
            const telefone = formData.get('Telefone');
            const bdayFormatted = formData.get('Aniversário');

            // Opcional: envia o form por email em background
            fetch("https://formsubmit.co/ajax/pablitosorvete@gmail.com", {
                method: "POST",
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).catch(() => { });

            // Redirect to WhatsApp
            const numeroWhatsApp = "5594984110527";
            const mensagem = `Olá, vim pelo portal! Quero finalizar meu cadastro no Clube VIP do Pablito.\n\n*Nome:* ${nome}\n*Telefone:* ${telefone}\n*Data de Nasc.:* ${bdayFormatted}`;
            const urlWhatsApp = `https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(mensagem)}`;

            // Wait slightly so fetch has a chance to init, then direct to WhatsApp
            setTimeout(() => {
                window.location.href = urlWhatsApp;
                // Reset form button after a delay
                setTimeout(() => {
                    submitBtn.innerHTML = `
                        <span>CONCLUIR NO WHATSAPP</span>
                        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 2L11 13"></path>
                            <path d="M22 2L15 22L11 13L2 9L22 2z"></path>
                        </svg>
                    `;
                    submitBtn.style.opacity = '1';
                    submitBtn.style.cursor = 'pointer';
                    form.reset();
                }, 2000);
            }, 500);

        });
    </script>

</body>

</html>
